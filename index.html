<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Musical Improv Freestyle Practice Tool</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <header>
    <h1>Musical Improv Freestyle Practice Tool</h1>
  </header>

  <section class="transport card">
    <div class="transport-top">
      <button id="playBtn" class="primary play-btn">Play</button>
      <div class="control control-master">
        <label for="master">Master Volume <span id="masterVal">75%</span></label>
        <input type="range" id="master" min="0" max="100" value="75" />
      </div>
    </div>
    <div id="styleTabs" class="pill-row" role="tablist" aria-label="Beat style"></div>
  </section>

  <section class="globals card">
    <div class="control control-bpm">
      <label for="bpmNum">BPM</label>
      <div class="bpm-row">
        <input type="number" id="bpmNum" min="60" max="240" value="92" />
        <button id="tapBtn" class="tap-btn">Tap</button>
        <input type="range" id="bpm" min="60" max="240" value="92" />
      </div>
    </div>
    <div class="control">
      <label for="swing">Swing <span id="swingVal">0%</span></label>
      <input type="range" id="swing" min="0" max="66" value="0" />
    </div>
  </section>

  <section class="sequencer card">
    <div class="card-head">
      <h2>Drums</h2>
      <button id="randBeatBtn">Randomize Beat</button>
    </div>
    <div id="grid" class="grid"></div>
  </section>

  <section class="chords card">
    <h2>Chords</h2>

    <div class="chord-globals">
      <div class="control">
        <label for="key">Key</label>
        <select id="key"></select>
      </div>
      <div class="control">
        <label for="scale">Scale</label>
        <select id="scale">
          <option value="major">Major</option>
          <option value="minor" selected>Natural Minor</option>
          <option value="dorian">Dorian</option>
          <option value="phrygian">Phrygian</option>
          <option value="mixolydian">Mixolydian</option>
          <option value="pentMinor">Pentatonic Minor</option>
        </select>
      </div>
      <div class="control">
        <label for="barsPerChord">Bars per Chord</label>
        <select id="barsPerChord">
          <option value="1" selected>1</option>
          <option value="2">2</option>
        </select>
      </div>
    </div>

    <div class="pill-row" id="chordTabs">
      <button class="pill active" data-mode="random">Random</button>
      <button class="pill" data-mode="presets">Presets</button>
      <button class="pill" data-mode="builder">Builder</button>
    </div>

    <div class="chord-mode" id="chordRandom">
      <button id="randChordBtn" class="primary">Generate Random Progression</button>
    </div>

    <div class="chord-mode hidden" id="chordPresets">
      <div class="preset-row">
        <select id="presetSelect"></select>
        <button id="loadPresetBtn">Load</button>
        <button id="saveCustomBtn">Save Current as Custom</button>
      </div>
    </div>

    <div class="chord-mode hidden" id="chordBuilder">
      <div class="builder-row" id="builderRow"></div>
    </div>

    <div class="chord-slots" id="chordSlots"></div>
  </section>

  <footer>
    <small>Created by Max Housner · 2026</small>
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
